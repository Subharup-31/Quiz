<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f23">
<title>Quiz Admin</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; }

  .topbar { padding: 20px 30px; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 16px; }
  .topbar h1 { font-size: 1.5rem; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .topbar .spacer { flex: 1; }
  .quiz-badge { padding: 6px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; }
  .quiz-badge.open { background: #0f3d1f; color: #4ade80; border: 1px solid #22643a; }
  .quiz-badge.closed { background: #2a1520; color: #f87171; border: 1px solid #5a2030; }
  .q-count { color: #888; font-size: 0.95rem; }
  .q-count span { color: #667eea; font-weight: 700; }

  .main { max-width: 820px; margin: 0 auto; padding: 30px 20px; }

  /* Controls bar */
  .controls { display: flex; gap: 10px; margin-bottom: 30px; }

  /* Cards */
  .card { background: #1a1a2e; border: 1px solid #252540; border-radius: 16px; padding: 28px; margin-bottom: 24px; }
  .card-title { font-size: 1rem; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-bottom: 20px; }

  /* Generate */
  .gen-form { display: flex; gap: 12px; align-items: stretch; }
  .gen-form input[type="text"] { flex: 1; padding: 14px 18px; border: 2px solid #252540; border-radius: 12px; background: #0f0f23; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
  .gen-form input[type="text"]:focus { border-color: #667eea; }
  .gen-form input[type="text"]::placeholder { color: #444; }
  .gen-form input[type="number"] { width: 70px; padding: 14px 10px; border: 2px solid #252540; border-radius: 12px; background: #0f0f23; color: #fff; font-size: 1rem; text-align: center; outline: none; }
  .gen-form input[type="number"]:focus { border-color: #667eea; }
  .quick-topics { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }
  .chip { padding: 6px 14px; border: 1px solid #252540; border-radius: 20px; background: transparent; color: #888; cursor: pointer; font-size: 0.85rem; transition: all 0.15s; }
  .chip:hover { border-color: #667eea; color: #fff; }

  /* Manual add */
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; color: #666; font-size: 0.85rem; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .form-row input[type="text"], .form-row textarea { width: 100%; padding: 12px 16px; border: 2px solid #252540; border-radius: 12px; background: #0f0f23; color: #fff; font-size: 1rem; outline: none; transition: border-color 0.2s; }
  .form-row input:focus { border-color: #667eea; }
  .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .opt-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border: 2px solid #252540; border-radius: 12px; background: #0f0f23; transition: border-color 0.2s; }
  .opt-row:has(input[type="radio"]:checked) { border-color: #4ade80; background: #0f1f15; }
  .opt-row input[type="radio"] { accent-color: #4ade80; width: 18px; height: 18px; cursor: pointer; }
  .opt-row input[type="text"] { flex: 1; border: none; background: transparent; color: #fff; font-size: 0.95rem; outline: none; }
  .opt-label { color: #555; font-size: 0.85rem; font-weight: 600; min-width: 18px; }
  .time-row { display: flex; align-items: center; gap: 12px; }
  .time-row input { width: 80px; }
  .time-row span { color: #666; font-size: 0.9rem; }

  /* Buttons */
  .btn { padding: 12px 24px; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; font-size: 0.95rem; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px; }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .btn-success { background: #22c55e; color: #000; }
  .btn-danger { background: transparent; border: 2px solid #dc2626; color: #f87171; }
  .btn-danger:hover { background: #dc2626; color: #fff; }
  .btn-ghost { background: transparent; border: 2px solid #252540; color: #888; }
  .btn-ghost:hover { border-color: #667eea; color: #fff; }
  .btn-sm { padding: 8px 16px; font-size: 0.85rem; border-radius: 10px; }
  .btn-icon { padding: 8px; border-radius: 8px; background: transparent; border: 1px solid #252540; color: #666; cursor: pointer; transition: all 0.15s; font-size: 1rem; }
  .btn-icon:hover { border-color: #f87171; color: #f87171; }

  /* Question list */
  .q-list-empty { text-align: center; padding: 40px; color: #444; }
  .q-item { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border: 1px solid #252540; border-radius: 12px; margin-bottom: 8px; background: #12122a; transition: background 0.15s; }
  .q-item:hover { background: #1a1a3a; }
  .q-num { color: #667eea; font-weight: 800; font-size: 1.1rem; min-width: 32px; text-align: center; }
  .q-body { flex: 1; min-width: 0; }
  .q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.4; }
  .q-opts { font-size: 0.8rem; color: #555; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-opts .correct { color: #4ade80; font-weight: 600; }

  /* Loading spinner */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid #fff4; border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; font-size: 0.95rem; font-weight: 500; z-index: 999; animation: fadeUp 0.3s ease; }
  .toast.success { background: #22c55e; color: #000; }
  .toast.error { background: #dc2626; color: #fff; }
  @keyframes fadeUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

  @media (max-width: 600px) {
    .topbar { padding: 14px 16px; gap: 10px; flex-wrap: wrap; }
    .topbar h1 { font-size: 1.2rem; }
    .q-count { font-size: 0.85rem; }
    .main { padding: 20px 12px; }
    .card { padding: 20px 16px; }
    .gen-form { flex-direction: column; }
    .gen-form input[type="number"] { width: 100%; }
    .opts-grid { grid-template-columns: 1fr; }
    .time-row { flex-wrap: wrap; }
    .controls { flex-wrap: wrap; }
    .q-opts { white-space: normal; }
  }

  /* Login screen */
  #login { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  #login .login-card { background: #1a1a2e; border: 1px solid #252540; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; text-align: center; }
  #login h1 { font-size: 2rem; margin-bottom: 8px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #login p { color: #555; margin-bottom: 24px; }
  #login input { width: 100%; padding: 14px 18px; font-size: 16px; border: 2px solid #252540; border-radius: 12px; background: #0f0f23; color: #fff; outline: none; margin-bottom: 16px; text-align: center; -webkit-appearance: none; }
  #login input:focus { border-color: #667eea; }
  #login .login-btn { width: 100%; padding: 14px; font-size: 1rem; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 700; cursor: pointer; }
  #login .login-err { color: #f87171; font-size: 0.9rem; margin-top: 8px; display: none; }
  #admin-panel { display: none; }
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <h1>Quiz Admin</h1>
    <p>Enter admin password</p>
    <input type="password" id="pwInput" placeholder="Password" autofocus>
    <button class="login-btn" id="loginBtn">Login</button>
    <div class="login-err" id="loginErr">Wrong password</div>
  </div>
</div>

<div id="admin-panel">
<div class="topbar">
  <h1>Quiz Admin</h1>
  <div class="spacer"></div>
  <div class="q-count"><span id="qCount">0</span> questions</div>
  <span class="quiz-badge closed" id="quizStatus">Closed</span>
</div>

<div class="main">

  <div class="controls">
    <button class="btn btn-success" id="startBtn" onclick="startQuiz()">Start Quiz</button>
    <button class="btn btn-danger btn-sm" id="stopBtn" onclick="stopQuiz()">Stop Quiz</button>
    <button class="btn btn-ghost btn-sm" onclick="resetQuiz()">Reset All</button>
  </div>

  <!-- AI Generate -->
  <div class="card">
    <div class="card-title">Generate with AI</div>
    <div class="gen-form">
      <input type="text" id="topicInput" placeholder="Enter any topic... e.g. JavaScript closures, React hooks, Python basics">
      <input type="number" id="genCount" value="5" min="1" max="20" title="Number of questions">
      <button class="btn btn-primary" id="genBtn" onclick="generate()">Generate</button>
    </div>
    <div class="quick-topics">
      <button class="chip" onclick="setTopic('JavaScript')">JavaScript</button>
      <button class="chip" onclick="setTopic('Python')">Python</button>
      <button class="chip" onclick="setTopic('HTML & CSS')">HTML & CSS</button>
      <button class="chip" onclick="setTopic('React')">React</button>
      <button class="chip" onclick="setTopic('Node.js')">Node.js</button>
      <button class="chip" onclick="setTopic('Git & GitHub')">Git & GitHub</button>
      <button class="chip" onclick="setTopic('SQL & Databases')">SQL</button>
      <button class="chip" onclick="setTopic('Data Structures')">DSA</button>
    </div>
  </div>

  <!-- Manual add -->
  <div class="card">
    <div class="card-title">Add Manually</div>
    <div class="form-row">
      <label>Question</label>
      <input type="text" id="manualQ" placeholder="Type your question...">
    </div>
    <div class="form-row">
      <label>Options (select correct answer)</label>
      <div class="opts-grid">
        <div class="opt-row"><input type="radio" name="correct" value="0" checked><span class="opt-label">A</span><input type="text" id="opt0" placeholder="Option A"></div>
        <div class="opt-row"><input type="radio" name="correct" value="1"><span class="opt-label">B</span><input type="text" id="opt1" placeholder="Option B"></div>
        <div class="opt-row"><input type="radio" name="correct" value="2"><span class="opt-label">C</span><input type="text" id="opt2" placeholder="Option C"></div>
        <div class="opt-row"><input type="radio" name="correct" value="3"><span class="opt-label">D</span><input type="text" id="opt3" placeholder="Option D"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="time-row">
        <label>Time</label>
        <input type="number" id="manualTime" value="15" min="5" max="60">
        <span>seconds</span>
        <div style="flex:1"></div>
        <button class="btn btn-primary btn-sm" onclick="addManual()">Add Question</button>
      </div>
    </div>
  </div>

  <!-- Questions list -->
  <div class="card">
    <div class="card-title">Questions</div>
    <div id="qList"><div class="q-list-empty">No questions yet. Generate some or add manually.</div></div>
  </div>
</div>

</div><!-- end admin-panel -->

<script>
let adminPassword = "";

// --- Login ---
document.getElementById("loginBtn").onclick = doLogin;
document.getElementById("pwInput").onkeydown = (e) => { if (e.key === "Enter") doLogin(); };

async function doLogin() {
  const pw = document.getElementById("pwInput").value.trim();
  try {
    const res = await fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (data.ok) {
      adminPassword = pw;
      document.getElementById("login").style.display = "none";
      document.getElementById("admin-panel").style.display = "block";
      loadQuestions();
    } else {
      document.getElementById("loginErr").style.display = "block";
    }
  } catch (e) {
    console.error("Login error:", e);
    document.getElementById("loginErr").textContent = "Connection error";
    document.getElementById("loginErr").style.display = "block";
  }
}

function authHeaders() {
  return { "Content-Type": "application/json", "x-admin-password": adminPassword };
}

function setTopic(t) { document.getElementById("topicInput").value = t; document.getElementById("topicInput").focus(); }

async function generate() {
  const topic = document.getElementById("topicInput").value.trim();
  if (!topic) return toast("Enter a topic first", "error");
  const count = parseInt(document.getElementById("genCount").value) || 5;
  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Generating...';
  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: authHeaders(),
      body: JSON.stringify({ topic, count })
    });
    const data = await res.json();
    if (data.error) { toast(data.error, "error"); return; }
    toast(`Added ${data.generated.length} questions!`, "success");
    loadQuestions();
  } catch (e) {
    toast("Generation failed", "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = "Generate";
  }
}

async function addManual() {
  const question = document.getElementById("manualQ").value.trim();
  const options = [0,1,2,3].map(i => document.getElementById("opt"+i).value.trim());
  const answer = parseInt(document.querySelector('input[name="correct"]:checked').value);
  const time = parseInt(document.getElementById("manualTime").value) || 15;
  if (!question || options.some(o => !o)) return toast("Fill in all fields", "error");
  const res = await fetch("/api/questions", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({ question, options, answer, time })
  });
  const data = await res.json();
  if (data.ok) {
    document.getElementById("manualQ").value = "";
    [0,1,2,3].forEach(i => document.getElementById("opt"+i).value = "");
    toast("Question added!", "success");
    loadQuestions();
  }
}

async function deleteQ(index) {
  await fetch("/api/questions/" + index, { method: "DELETE", headers: authHeaders() });
  loadQuestions();
}

async function loadQuestions() {
  const res = await fetch("/api/questions", { headers: authHeaders() });
  const data = await res.json();
  document.getElementById("qCount").textContent = data.questions.length;
  const statusEl = document.getElementById("quizStatus");
  statusEl.textContent = data.quizOpen ? "Live" : "Closed";
  statusEl.className = "quiz-badge " + (data.quizOpen ? "open" : "closed");

  const list = document.getElementById("qList");
  if (data.questions.length === 0) {
    list.innerHTML = '<div class="q-list-empty">No questions yet. Generate some or add manually.</div>';
    return;
  }
  list.innerHTML = data.questions.map((q, i) => `
    <div class="q-item">
      <div class="q-num">${i+1}</div>
      <div class="q-body">
        <div class="q-text">${esc(q.question)}</div>
        <div class="q-opts">${q.options.map((o, j) => j === q.answer ? `<span class="correct">${esc(o)}</span>` : esc(o)).join(" &middot; ")}</div>
      </div>
      <button class="btn-icon" onclick="deleteQ(${i})" title="Delete">&#x2715;</button>
    </div>
  `).join("");
}

async function startQuiz() {
  const res = await fetch("/api/quiz/start", { method: "POST", headers: authHeaders() });
  const data = await res.json();
  if (data.error) return toast(data.error, "error");
  toast("Quiz is live!", "success");
  loadQuestions();
}

async function stopQuiz() {
  const res = await fetch("/api/quiz/stop", { method: "POST", headers: authHeaders() });
  const data = await res.json();
  if (data.error) return toast(data.error, "error");
  toast("Quiz stopped", "success");
  loadQuestions();
}

async function resetQuiz() {
  if (!confirm("Reset quiz and clear all players?")) return;
  await fetch("/api/quiz/reset", { method: "POST", headers: authHeaders() });
  toast("Quiz reset", "success");
  loadQuestions();
}

function esc(s) { const d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

function toast(msg, type) {
  const el = document.createElement("div");
  el.className = "toast " + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

</script>
</body>
</html>
